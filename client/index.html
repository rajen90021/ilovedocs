<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>ILoveDocs — Free Online PDF & Document Tools</title>
    <meta name="description" content="Free online tools to merge, split, compress, rotate, watermark, convert and edit PDF files. Plus image compression, resizing, and format conversion. No signup required." />
    <meta name="keywords"    content="PDF tools, merge PDF, compress PDF, PDF to Word, Word to PDF, PDF to JPG, image converter, online PDF editor, document tools free" />
    <meta name="robots"      content="index,follow" />
    <meta name="author"      content="ILoveDocs" />
    <link rel="canonical"    href="https://ilovedocs.in" />

    <!-- Favicon -->
    <link rel="icon"             type="image/png"     href="/favicon.png?v=2" sizes="48x48" />
    <link rel="icon"             type="image/svg+xml" href="/favicon.svg?v=2" />
    <link rel="apple-touch-icon" href="/favicon.png?v=2" />

    <!-- Open Graph (social sharing defaults, overridden per-page by Helmet) -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="ILoveDocs" />
    <meta property="og:title"       content="ILoveDocs — Free Online PDF & Document Tools" />
    <meta property="og:description" content="Merge, split, compress, convert, and edit PDF and image files 100% free. 20+ tools, no signup, files auto-deleted after 1 hour." />
    <meta property="og:url"         content="https://ilovedocs.in" />
    <meta property="og:image"       content="https://ilovedocs.in/og-default.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card defaults -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@ilovedocs" />
    <meta name="twitter:title"       content="ILoveDocs — Free Online PDF & Document Tools" />
    <meta name="twitter:description" content="Merge, split, compress, and convert PDF files online for free." />
    <meta name="twitter:image"       content="https://ilovedocs.in/og-default.png" />

    <!-- Preconnect to Google Fonts for speed -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Base JSON-LD WebSite schema (page-level schemas injected by Helmet) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "ILoveDocs",
      "url": "https://ilovedocs.in",
      "description": "Free online PDF and document tools — merge, split, compress, rotate, watermark, convert and edit files.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://ilovedocs.in/tools?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
